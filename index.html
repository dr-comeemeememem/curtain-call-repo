<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pop-up Design</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="banner">
        <div class="brand">
            <img draggable="false" src="assets/logo.svg" alt="Logo">
        </div>
        <div class="menu" id="menu">
            <button type="button" class="profile-icon" id="menu-trigger" aria-label="Open profile menu">
                <p class="account-abrev">JS</p>
            </button>
            <div class="window" id="menu-window">
                <button type="button" class="window-item">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/profile.svg" alt="profile icon">
                    </div>
                    <div class="window-item-text">
                        <div class="title">Profile</div>
                    </div>
                </button>
                <button type="button" class="window-item">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/settings.svg" alt="logout icon">
                    </div>
                    <div class="window-item-text">
                        <div class="title">Settings</div>
                    </div>
                </button>
                <button type="button" class="window-item">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/log-out.svg" alt="logout icon">
                    </div>
                    <div class="window-item-text">
                        <div class="title">Log out</div>
                    </div>
                </button>
                <div class="separator"></div>
                <button type="button" class="window-item window-item-expand" id="help-item" aria-expanded="false" aria-controls="secondary-window">
                    <div class="window-item-icon">
                        <img draggable="false" src="assets/help.svg" alt="help icon"> 
                    </div>
                    <div class="window-item-text">
                        <div class="title">Help</div>
                    </div>
                    <div class="window-item-icon" id="help-expand-chevron">
                        <img draggable="false" src="assets/expand.svg" alt="expand icon"> 
                    </div>
                </button>
            </div>
            <div class="secondary-window" id="secondary-window">
                <button type="button" class="secondary-window-item">
                    <span class="sub-title">Help center</span>
                    <img draggable="false" src="assets/up-arrow.svg" alt="up arrow icon">
                </button>
                <button type="button" class="secondary-window-item">
                    <span class="sub-title">Report a bug</span>
                </button>
                <button type="button" class="secondary-window-item">
                    <span class="sub-title">Terms & policies</span>
                </button>
            </div>
        </div>
    </div>
    <div class="content">
        <div class="main">
            <div class="schedule">
                <div class="scheduleContents">
                    <div class="scheduleHeader"></div>
                    <div class="scheduleBody"></div>
                </div>
            </div>
            <div class="stats">
                <div class="statsHeader"></div>
                <div class="statsBody"></div>
            </div>
        </div>
        <div class="forms">
            <div class="formsHeader"></div>
            <div class="formsBody"></div>
        </div>
    </div>

    <script src="logic.js"></script>
</body>
</html>
